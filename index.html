<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard OSN-K Dikdas</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<h1>Dashboard OSN-K Dikdas</h1>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Cari nama / sekolah / kota...">

  <select id="filterJenjang">
    <option value="">Semua Jenjang</option>
    <option value="SD">SD</option>
    <option value="SMP">SMP</option>
  </select>

  <select id="filterCabang">
    <option value="">Semua Mata Pelajaran</option>
    <option value="IPA">IPA</option>
    <option value="IPS">IPS</option>
    <option value="Matematika">Matematika</option>
  </select>

  <select id="filterProvinsi">
    <option value="">Semua Provinsi</option>
    <!-- Diisi dinamis dari data -->
  </select>

  <div class="controls-right">
    <button class="btn-icon" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
    <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
  </div>
</div>

<div class="section-label">🏆 Top 3 Sekolah Terbanyak Meloloskan Peserta</div>
<div class="ranking-note">
  ℹ️ Peringkat dihitung per sekolah unik (NPSN/lokasi). Sekolah jaringan seperti "IT ROBBANI" dengan cabang di beda kota dihitung terpisah — bukan digabung seolah satu sekolah.
</div>
<div id="top3"></div>

<canvas id="chartSekolah"></canvas>

<table>
  <thead>
    <tr>
      <th>Nama Peserta</th>
      <th>Mapel</th>
      <th>Sekolah</th>
      <th>Kab/Kota</th>
      <th>Provinsi</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="pagination"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
