<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Peserta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dashboard Peserta</h1>

<div class="controls">
  <input type="text" id="search" placeholder="Cari nama...">
  
  <select id="filterSekolah">
    <option value="">Semua Sekolah</option>
  </select>

  <button id="toggleDark">🌙 Dark Mode</button>
  <button id="exportExcel">Export Excel</button>
</div>

<div id="top3"></div>

<div id="loading">Loading data...</div>
<div id="noData" class="hidden">Data tidak ditemukan</div>

<table id="table">
  <thead>
    <tr>
      <th>No</th>
      <th>Nama</th>
      <th>Sekolah</th>
      <th>Nilai</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="pagination"></div>

<script src="script.js"></script>
</body>
</html>
